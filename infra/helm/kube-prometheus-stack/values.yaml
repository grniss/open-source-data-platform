grafana:
  adminPassword: admin
  service:
    type: ClusterIP
  defaultDashboardsEnabled: true
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: lakehouse
          orgId: 1
          folder: Lakehouse
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/lakehouse
  dashboards:
    lakehouse:
      trino:
        gnetId: 11118
        revision: 1
        datasource: Prometheus
      spark-on-k8s:
        gnetId: 7890
        revision: 1
        datasource: Prometheus

prometheus:
  prometheusSpec:
    retention: 1d                  # local: keep only a day
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    resources:
      requests: { cpu: "200m", memory: "512Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi          # local: trim from 50Gi

# Disable the heavy / not-needed-for-demo bits to fit in 12 GB host
alertmanager:
  enabled: false                    # local: skip — re-enable in prod

prometheus-node-exporter:
  resources:
    requests: { cpu: "20m",  memory: "32Mi" }
    limits:   { cpu: "100m", memory: "64Mi" }

kube-state-metrics:
  resources:
    requests: { cpu: "20m",  memory: "32Mi" }
    limits:   { cpu: "100m", memory: "128Mi" }

prometheusOperator:
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "200m", memory: "256Mi" }
