# Official MinIO Helm chart values
# Source: https://github.com/minio/minio/tree/master/helm/minio

mode: standalone
replicas: 1

rootUser: minio
rootPassword: minio12345

persistence:
  enabled: true
  size: 50Gi

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001

# Pre-create the dp-lmwn bucket on first start (single bucket for Iceberg data)
buckets:
  - name: dp-lmwn
    policy: none
    purge: false

resources:
  requests: { cpu: "200m", memory: "1Gi" }
  limits:   { cpu: "1",    memory: "2Gi" }

# Metrics intentionally off — MinIO is local-dev-only, not worth scraping.
# Re-enable later by setting:
#   metrics.serviceMonitor.enabled: true
# AND adding `needs: [observability/kube-prometheus-stack]` on this release
# in helmfile.yaml so the Prometheus Operator CRDs (Probe, ServiceMonitor)
# exist before MinIO renders.
