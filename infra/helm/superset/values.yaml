# Custom image with psycopg2-binary + trino[sqlalchemy] baked in.
# Built from infra/images/superset/Dockerfile and loaded into kind via:
#   kind load docker-image lakehouse/superset:5.0.0 --name data-platform
image:
  repository: lakehouse/superset
  tag: "6.0.0"
  pullPolicy: IfNotPresent

# Superset 5.x refuses to start with the chart's default placeholder SECRET_KEY.
# Local-dev value below; in prod, source from a sealed secret / external secret manager.
extraEnv:
  SUPERSET_SECRET_KEY: "local-dev-only-7c4f9b3e2a8d6f1c5e9a0b2d4f6a8c1e3b5d7f9a"

# Cache dashboard queries — kills redundant fan-out
configOverrides:
  cache: |
    CACHE_CONFIG = {
      "CACHE_TYPE": "RedisCache",
      "CACHE_DEFAULT_TIMEOUT": 300,
      "CACHE_KEY_PREFIX": "superset_",
      "CACHE_REDIS_HOST": "superset-redis-master",
      "CACHE_REDIS_PORT": 6379,
      "CACHE_REDIS_DB": 1,
    }
    DATA_CACHE_CONFIG = CACHE_CONFIG
  features: |
    FEATURE_FLAGS = {
      "ENABLE_TEMPLATE_PROCESSING": True,
      "DASHBOARD_NATIVE_FILTERS": True,
    }
  enable_oidc: |
    from flask_appbuilder.security.manager import AUTH_OAUTH

    AUTH_TYPE = AUTH_OAUTH
    AUTH_USER_REGISTRATION = True
    AUTH_USER_REGISTRATION_ROLE = "Public"
    AUTH_ROLES_SYNC_AT_LOGIN = True
    # FAB's built-in keycloak handler reads 'groups' from the userinfo endpoint as role_keys.
    # Keycloak maps realm roles → 'groups' claim via the protocol mapper in realm-configmap.yaml.
    AUTH_ROLES_MAPPING = {
        "admin":            ["Admin"],
        "analyst":          ["Gamma", "sql_lab"],
        "dashboard_viewer": ["Gamma"],
    }
    AUTH_OAUTH_SAVE_TOKENS = True

    OAUTH_PROVIDERS = [
      {
        "name": "keycloak",
        "save_token": True,
        "icon": "fa-key",
        "token_key": "access_token",
        "remote_app": {
          "client_id": "superset",
          "client_secret": "superset-secret",
          "api_base_url": "http://keycloak.auth.svc.cluster.local:8080/realms/dp-lmwn/protocol/openid-connect",
          "access_token_url": "http://keycloak.auth.svc.cluster.local:8080/realms/dp-lmwn/protocol/openid-connect/token",
          "authorize_url": "http://localhost:8080/realms/dp-lmwn/protocol/openid-connect/auth",
          "jwks_uri": "http://keycloak.auth.svc.cluster.local:8080/realms/dp-lmwn/protocol/openid-connect/certs",
          "userinfo_endpoint": "http://keycloak.auth.svc.cluster.local:8080/realms/dp-lmwn/protocol/openid-connect/userinfo",
          "client_kwargs": {"scope": "openid profile email roles"}
        }
      }
    ]

    DATABASE_OAUTH2_CLIENTS = {
      "trino": {
          "client_id": "trino",
          "client_secret": "trino-secret",
          "authorization_uri": "http://localhost:8080/realms/dp-lmwn/protocol/openid-connect/auth",
          "token_uri": "http://keycloak.auth.svc.cluster.local:8080/realms/dp-lmwn/protocol/openid-connect/token",
          "scope": "openid profile email groups"
      }
    }

  mutate_db_username: |
    from trino.auth import JWTAuthentication
    from flask import session
    import logging
    

    def DB_CONNECTION_MUTATOR(uri, params, username, security_manager, source):
      logging.info(f'here from mutator {session}')
      token = session.get("access_token")

      params.setdefault("connect_args", {})
      params["connect_args"]["user"] = username
      
      if token:
          params["connect_args"]["auth"] = JWTAuthentication(token)

      return uri, params


# Pre-register Trino as a database with user impersonation enabled
# so Polaris RBAC is enforced via the logged-in user's identity.
# File must be named import_datasources.yaml — the chart's default init script
# checks for this exact name and runs: superset import_datasources -p /app/configs/import_datasources.yaml
extraConfigs:
  import_datasources.yaml: |
    databases:
      - database_name: Trino-Lakehouse
        sqlalchemy_uri: trino://trino.query-engines.svc.cluster.local:8080/iceberg
        impersonate_user: true
        cache_timeout: 300

init:
  initscript: |-
    #!/bin/sh
    set -eu
    echo "Running DB migrations..."
    superset db upgrade
    echo "Initializing roles..."
    superset init
    echo "Importing datasources..."
    superset import_datasources -p /app/configs/import_datasources.yaml || true
    echo "Granting Trino-Lakehouse access to Gamma role..."
    python3 << 'PYEOF'
    from superset.app import create_app
    app = create_app()
    with app.app_context():
        from superset.extensions import db
        from superset.models.core import Database as DB
        sm = app.appbuilder.sm
        trino_db = db.session.query(DB).filter_by(database_name="Trino-Lakehouse").first()
        if trino_db:
            gamma = sm.find_role("Gamma")
            perm = sm.find_permission_view_menu("database_access", trino_db.perm)
            if perm and gamma:
                sm.add_permission_role(gamma, perm)
                db.session.commit()
                print("Granted Trino-Lakehouse access to Gamma")
            else:
                print("Permission or Gamma role not found, skipping grant")
        else:
            print("Trino-Lakehouse not found, skipping grant")
    PYEOF

postgresql:
  enabled: true
  # Bitnami moved free public images to bitnamilegacy/* in Aug 2025; the old
  # bitnami/* path 404s. Override here so the bundled subchart pulls successfully.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  primary:
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits:   { cpu: "500m", memory: "512Mi" }

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  master:
    resources:
      requests: { cpu: "50m",  memory: "64Mi" }
      limits:   { cpu: "200m", memory: "128Mi" }

resources:
  requests: { cpu: "100m", memory: "384Mi" }
  limits:   { cpu: "500m", memory: "768Mi" }

# Celery worker. The chart default forks 8 processes (`concurrency=8`) which
# OOMs at ~128Mi limits — drop to 2 for local dev and give it 768Mi so it
# can boot and run a couple tasks comfortably.
supersetWorker:
  command:
    - /bin/sh
    - -c
    - "celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair -c 2"
  resources:
    requests: { cpu: "100m", memory: "384Mi" }
    limits:   { cpu: "500m", memory: "768Mi" }

env:
  OAUTHLIB_INSECURE_TRANSPORT: "1"
