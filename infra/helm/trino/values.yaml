image:
  tag: "481"

server:
  workers: 0    # coordinator-only for local; coordinator handles small queries alone
  config:
    query:
      maxMemory: "1GB"
      maxMemoryPerNode: "512MB"
    # authenticationType: "JWT"

coordinator:
  resources:
    requests: { cpu: "300m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "2Gi" }

worker:
  resources:
    requests: { cpu: "300m", memory: "1Gi" }
    limits:   { cpu: "1",    memory: "2Gi" }

# Iceberg connector pointing at Polaris REST catalog
catalogs:
  iceberg: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://polaris.data-catalog.svc.cluster.local:8181/api/catalog
    iceberg.rest-catalog.warehouse=dp-lmwn
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential=root:localdev-polaris-root-secret
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    iceberg.rest-catalog.vended-credentials-enabled=false
    iceberg.unique-table-location=true
    fs.native-s3.enabled=true
    s3.region=ap-southeast-1
    s3.endpoint=http://minio.storage.svc.cluster.local:9000
    s3.path-style-access=true
    s3.aws-access-key=minio
    s3.aws-secret-key=minio12345

# TODO: enable TLS for jwt auth + incoming authz forward from superset will be a great feature: https://github.com/trinodb/trino/issues/28571
# additionalConfigProperties:
#   - internal-communication.shared-secret=fixme
#   - http-server.authentication.jwt.key-file=http://keycloak.auth.svc.cluster.local:8080/realms/dp-lmwn/protocol/openid-connect/certs
#   - http-server.authentication.jwt.principal-field=preferred_username
#   - http-server.authentication.jwt.user-mapping.pattern=(.*)
#   - http-server.authentication.allow-insecure-over-http=true


coordinator:
  additionalConfigFiles:

    log.properties: |
      io.trino=DEBUG

    # OPA access-control: routes every authorization check to OPA.
    access-control.properties: |
      access-control.name=opa
      opa.policy.uri=http://opa-opa-kube-mgmt.policy.svc.cluster.local:8181/v1/data/trino/allow

    group-provider.properties: |
      group-provider.name=file
      file.group-file=/etc/trino/groups.properties

    groups.properties: |
      admin:admin
      analyst:analyst1
      dashboard_viewer:viewer1

serviceMonitor:
  enabled: false   # off until kube-prometheus-stack CRDs proven stable
