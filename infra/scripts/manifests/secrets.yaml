# Local-dev plaintext credentials for Polaris.
# In prod, replace with sealed-secrets / external-secrets / vault-injected values.
---
apiVersion: v1
kind: Secret
metadata:
  name: polaris-pg-creds
  namespace: data-catalog
type: Opaque
stringData:
  username: polaris_user
  password: polaris_pass
  jdbcUrl: jdbc:postgresql://shared-postgresql.storage.svc.cluster.local:5432/polaris_db
---
apiVersion: v1
kind: Secret
metadata:
  name: polaris-minio-creds
  namespace: data-catalog
type: Opaque
stringData:
  accessKeyId: minio
  secretAccessKey: minio12345
---
apiVersion: v1
kind: Secret
metadata:
  name: polaris-root-creds
  namespace: data-catalog
type: Opaque
stringData:
  clientId: root
  clientSecret: localdev-polaris-root-secret
---
# Spark batch job service principal.
# clientSecret is written by polaris-mount-catalog.sh at bootstrap time.
# In prod, replace with sealed-secrets / external-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: polaris-spark-creds
  namespace: spark-jobs
type: Opaque
stringData:
  POLARIS_CLIENT_ID: spark-etl
  POLARIS_CLIENT_SECRET: ""
